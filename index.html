<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despierta tu Voz - Mantenimiento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="theme-color" content="#8e7d6d">
    <style>
        body {
            background-color: var(--color-fondo);
            margin: 0;
            font-family: var(--fuente-principal);
        }
        .maintenance-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .maintenance-card {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(142, 125, 109, 0.1);
        }
        .maintenance-card img {
            width: 100px;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        .maintenance-card h1 {
            color: var(--color-acento);
            font-size: 1.6rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .maintenance-card p {
            color: #555;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn-landing {
            background: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-block;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .btn-landing:hover {
            background: var(--color-acento);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 125, 109, 0.25);
            color: white;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-card">
            <img src="logo-appDTV2.png" alt="Despierta tu Voz Logo">
            <h1>TEMPORALMENTE FUERA DE SERVICIO</h1>
            <p>El Mentor Vocal está meditando y afinando sus cuerdas para ofrecerte una experiencia aún más profunda. Volveremos pronto a conectar.</p>
            <a href="landing.html" class="btn-landing">MÁS INFORMACIÓN SOBRE LA APP DESPIERTA TU VOZ</a>
        </div>
    </div>
</body>
</html>
